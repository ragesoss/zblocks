<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>zblocks — Wikifunctions composition editor</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2016%2016%22%3E%3Crect%20width%3D%2216%22%20height%3D%2216%22%20rx%3D%223%22%20fill%3D%22%232a4365%22%2F%3E%3Ctext%20x%3D%228%22%20y%3D%2212%22%20text-anchor%3D%22middle%22%20font-family%3D%22system-ui%22%20font-size%3D%2212%22%20font-weight%3D%22700%22%20fill%3D%22%23ffffff%22%3Ez%3C%2Ftext%3E%3C%2Fsvg%3E">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/blockly@11/blockly.min.js"></script>
</head>
<body>
  <header>
    <h1>zblocks</h1>
    <div id="shell-status"></div>
    <select id="load-example-select" title="Load a worked example">
      <option value="" data-i18n="header.example_picker_default"></option>
    </select>
    <button id="add-function-btn"
            data-i18n="header.buttons.add_function"
            data-i18n-title="header.buttons.add_function_title"></button>
    <button id="import-btn"
            data-i18n="header.buttons.import"
            data-i18n-title="header.buttons.import_title"></button>
    <button id="open-shell-btn" data-i18n="header.buttons.declare_shell"></button>
    <button id="run-btn"
            data-i18n="header.buttons.run"
            data-i18n-title="header.buttons.run_title"></button>
    <button id="export-btn" data-i18n="header.buttons.export"></button>
    <div id="language-picker-container"></div>
  </header>

  <main>
    <div id="blocklyDiv"></div>
  </main>

  <footer>
    <span data-i18n-html="footer.source"></span>
  </footer>

  <!-- ── Function-shell declaration modal ────────────────────────── -->
  <dialog id="shell-modal">
    <h2 data-i18n="shell_modal.title"></h2>
    <p class="hint" data-i18n-html="shell_modal.hint"></p>
    <div class="shell-header">
      <label>
        <span data-i18n="shell_modal.field.zid"></span>
        <input id="shell-zid" type="text" placeholder="Z33682">
      </label>
      <label>
        <span data-i18n="shell_modal.field.output"></span>
        <input id="shell-output" type="text" placeholder="Z20838">
      </label>
    </div>
    <fieldset>
      <legend data-i18n="shell_modal.args.legend"></legend>
      <div id="shell-args"></div>
      <button type="button" id="shell-add-arg" data-i18n="shell_modal.args.add"></button>
    </fieldset>
    <menu>
      <button type="button" id="shell-cancel" data-i18n="shell_modal.cancel"></button>
      <button type="button" id="shell-save" data-i18n="shell_modal.save"></button>
    </menu>
  </dialog>

  <!-- ── Fill slots from test: pull known-good inputs ────────────── -->
  <dialog id="fill-slots-modal">
    <h2 id="fill-slots-heading" data-i18n="fill_slots.title"></h2>
    <p class="hint" id="fill-slots-hint" data-i18n="fill_slots.loading"></p>
    <label class="fill-slots-picker">
      <span data-i18n="fill_slots.test_label"></span>
      <select id="fill-slots-select" disabled>
        <option value="" data-i18n="fill_slots.loading"></option>
      </select>
    </label>
    <div id="fill-slots-preview"></div>
    <div id="fill-slots-error" class="error"></div>
    <menu>
      <button type="button" id="fill-slots-cancel" data-i18n="fill_slots.cancel"></button>
      <button type="button" id="fill-slots-apply" disabled data-i18n="fill_slots.apply"></button>
    </menu>
  </dialog>

  <!-- ── Slot picker: fill an empty input slot ───────────────────── -->
  <dialog id="slot-picker-modal">
    <h2 id="slot-picker-heading" data-i18n="slot_picker.title"></h2>
    <p class="hint" id="slot-picker-hint"></p>
    <input id="slot-picker-input" type="text"
           data-i18n-placeholder="slot_picker.filter_placeholder"
           autocomplete="off">
    <div id="slot-picker-results"></div>
    <menu>
      <button type="button" id="slot-picker-close" data-i18n="slot_picker.close"></button>
    </menu>
  </dialog>

  <!-- ── Wikidata search: find a Q/P number by label ─────────────── -->
  <dialog id="wikidata-search-modal">
    <h2 id="wikidata-search-heading">Search Wikidata</h2>
    <p class="hint" id="wikidata-search-hint"></p>
    <input id="wikidata-search-input" type="text" placeholder="Search Wikidata…" autocomplete="off" spellcheck="false">
    <div id="wikidata-search-results"></div>
    <menu>
      <button type="button" id="wikidata-search-close">Close</button>
    </menu>
  </dialog>

  <!-- ── Import: load an existing Z14 ─────────────────────────────── -->
  <dialog id="import-modal">
    <h2 data-i18n="import_modal.title"></h2>
    <p class="hint" data-i18n="import_modal.hint"></p>
    <div class="import-tabs">
      <label>
        <span data-i18n="import_modal.zid_label"></span>
        <input id="import-zid" type="text"
               data-i18n-placeholder="import_modal.zid_placeholder"
               autocomplete="off" spellcheck="false">
      </label>
      <label>
        <span data-i18n="import_modal.json_label"></span>
        <textarea id="import-json" rows="6" spellcheck="false"
          placeholder='{"Z1K1":"Z7","Z7K1":"Z21032",...}'></textarea>
      </label>
    </div>
    <div id="import-error" class="error"></div>
    <menu>
      <button type="button" id="import-cancel" data-i18n="import_modal.cancel"></button>
      <button type="button" id="import-submit" data-i18n="import_modal.submit"></button>
    </menu>
  </dialog>

  <!-- ── Add function: search Wikifunctions ──────────────────────── -->
  <dialog id="add-function-modal">
    <h2 data-i18n="search_modal.title"></h2>
    <p class="hint" data-i18n-html="search_modal.hint"></p>
    <div class="search-row">
      <input id="search-input" type="text"
             data-i18n-placeholder="search_modal.search_placeholder"
             autocomplete="off">
      <span id="search-status" class="hint"></span>
    </div>
    <div class="filter-row" data-filter="output">
      <label data-i18n="search_modal.filter.returns"></label>
      <input class="filter-input" id="filter-output" type="text"
             data-i18n-placeholder="search_modal.filter.placeholder_any"
             autocomplete="off" spellcheck="false">
      <div class="filter-chips"></div>
    </div>
    <div class="filter-row" data-filter="input">
      <label data-i18n="search_modal.filter.takes"></label>
      <input class="filter-input" id="filter-input" type="text"
             data-i18n-placeholder="search_modal.filter.placeholder_any_multi"
             autocomplete="off" spellcheck="false">
      <div class="filter-chips"></div>
    </div>
    <div id="search-results"></div>
    <menu>
      <button type="button" id="search-close" data-i18n="search_modal.close"></button>
    </menu>
  </dialog>

  <!-- ── Run: collect inputs ────────────────────────────────────── -->
  <dialog id="run-modal">
    <h2 data-i18n="run_modal.title"></h2>
    <p class="hint" data-i18n-html="run_modal.hint"></p>
    <div id="run-test-loader" class="run-test-loader" hidden>
      <label>
        <span data-i18n="run_modal.test_label"></span>
        <select id="run-test-select" disabled>
          <option value="" data-i18n="run_modal.test_unchecked"></option>
        </select>
      </label>
    </div>
    <div id="run-inputs"></div>
    <div id="run-error" class="error"></div>
    <menu>
      <button type="button" id="run-cancel" data-i18n="run_modal.cancel"></button>
      <button type="button" id="run-submit" data-i18n="run_modal.submit"></button>
    </menu>
  </dialog>

  <!-- ── Run: result ────────────────────────────────────────────── -->
  <dialog id="result-modal">
    <h2 id="result-heading" data-i18n="result_modal.title_ok"></h2>
    <div id="result-value"></div>
    <details>
      <summary data-i18n="result_modal.raw_details"></summary>
      <pre id="result-raw"></pre>
    </details>
    <menu>
      <button type="button" id="result-close" data-i18n="result_modal.close"></button>
      <button type="button" id="result-rerun" data-i18n="result_modal.rerun"></button>
    </menu>
  </dialog>

  <!-- ── Export modal ────────────────────────────────────────────── -->
  <dialog id="export-modal">
    <h2 data-i18n="export_modal.title"></h2>
    <p class="hint" data-i18n-html="export_modal.hint"></p>
    <textarea id="export-json" readonly spellcheck="false"></textarea>
    <div id="export-error" class="error"></div>
    <menu>
      <button type="button" id="export-close" data-i18n="export_modal.close"></button>
      <button type="button" id="export-copy" data-i18n="export_modal.copy"></button>
    </menu>
  </dialog>

  <script type="module" src="js/app.js"></script>
</body>
</html>
